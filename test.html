<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survey Test</title>
</head>

<body>

<h2>Survey Test</h2>

<form id="testForm">

    <input
        type="text"
        id="company_name"
        placeholder="Company Name"
        value="TEST_COMPANY"
    >

    <br><br>

    <button type="submit">
        Submit
    </button>

</form>

<script>

document
.getElementById("testForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const data = {

        company_name:
            document.getElementById("company_name").value

    };

    try {

        const response =
        await fetch(
            "https://script.google.com/macros/s/AKfycbzoDDf1E3AmhOK4q6RJw6R0o8HT9crrfj2O3cEvkQZVvyl45Q27RpNA-NB7uBNplB95/exec",
            {
                method: "POST",
                body: JSON.stringify(data)
            }
        );

        const result =
        await response.json();

        console.log(result);

        alert(
            JSON.stringify(result)
        );

    }
    catch(err){

        console.error(err);

        alert(
            "ERROR\n\n" + err
        );

    }

});

</script>

</body>
</html>
