<style>

    .dashboard-hero {
        padding: 80px 0 40px;
        text-align: center;
    }

    .dashboard-hero h2 {
        font-size: 2.5rem;
        margin-bottom: 16px;
    }

    .dashboard-hero p {
        color: #666;
    }

    .dashboard-container {
        max-width: 1200px;
        margin: 0 auto 80px;
        padding: 0 20px;
    }

    .kpi-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 24px;
        margin-bottom: 50px;
    }

    .kpi-card {
        background: #fff;
        border-radius: 20px;
        padding: 36px 24px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }

    .kpi-label {
        color: #777;
        font-size: 0.95rem;
        margin-bottom: 16px;
    }

    .kpi-value {
        font-size: 3rem;
        font-weight: 700;
        color: #222;
    }

    .table-card {
        background: #fff;
        border-radius: 20px;
        padding: 32px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.06);
        overflow-x: auto;
    }

    .table-card h3 {
        margin-bottom: 24px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    thead {
        background: #f8f8f8;
    }

    th,
    td {
        padding: 14px;
        text-align: left;
        border-bottom: 1px solid #eee;
    }

    th {
        font-weight: 600;
    }

    tr:hover {
        background: #fafafa;
    }

    .loading {
        text-align: center;
        padding: 80px 20px;
        color: #666;
    }

    @media (max-width: 768px) {

        .dashboard-hero h2 {
            font-size: 2rem;
        }

        .kpi-grid {
            grid-template-columns: 1fr;
        }

        .kpi-value {
            font-size: 2.3rem;
        }

        th,
        td {
            padding: 10px;
            font-size: 0.9rem;
        }

    }

</style>

</head>

<body>

    <section class="dashboard-hero">

        <h2>CRM Dashboard</h2>

        <p>
            客戶關係管理總覽
        </p>

    </section>

    <section>

        <div class="dashboard-container">

            <div id="loading" class="loading">
                讀取資料中...
            </div>

            <div id="dashboardContent" style="display:none;">

                <div class="kpi-grid">

                    <div class="kpi-card">
                        <div class="kpi-label">客戶總數</div>
                        <div class="kpi-value" id="totalCustomers">0</div>
                    </div>

                    <div class="kpi-card">
                        <div class="kpi-label">回購率</div>
                        <div class="kpi-value" id="repurchaseRate">0%</div>
                    </div>

                </div>

                <div class="table-card">

                    <h3>客戶資料庫</h3>

                    <table>

                        <thead>

                            <tr>

                                <th>客戶姓名</th>
                                <th>公司名稱</th>
                                <th>聯絡人</th>
                                <th>LINE名稱</th>
                                <th>來源</th>
                                <th>決策者</th>
                                <th>購買次數</th>
                                <th>最後購買日期</th>

                            </tr>

                        </thead>

                        <tbody id="customerTableBody">

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </section>

    <script>

    const API_URL =
    "https://script.google.com/macros/s/AKfycbydkuYYK9nokEHeazKTrYQhvxjl_vmN1QaVS1PwVU-uiC0sC-C3cN4u9ZxEpL_Ax7aK/exec?action=crm";

    fetch(API_URL)
    .then(response => response.json())
    .then(data => {

        document.getElementById("loading").style.display = "none";

        document.getElementById("dashboardContent").style.display = "block";

        document.getElementById("totalCustomers").textContent =
        data.totalCustomers;

        document.getElementById("repurchaseRate").textContent =
        data.repurchaseRate + "%";

        const tbody =
        document.getElementById("customerTableBody");

        data.customers.forEach(customer => {

            const d =
            new Date(customer.last_purchase_date);

            const dateText =
            `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}:${String(d.getSeconds()).padStart(2,"0")}`;

            const tr =
            document.createElement("tr");

            tr.innerHTML = `

                <td>${customer.name || ""}</td>

                <td>${customer.company_name || ""}</td>

                <td>${customer.contact_name || ""}</td>

                <td>${customer.line_name || ""}</td>

                <td>${customer.source || ""}</td>

                <td>${customer.decision_maker || ""}</td>

                <td>${customer.purchase_count || 0}</td>

                <td>${dateText}</td>

            `;

            tbody.appendChild(tr);

        });

    })
    .catch(error => {

        console.error(error);

        document.getElementById("loading").innerHTML =
        "資料讀取失敗";

    });

    </script>

</body>
</html>
