<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>訂單結果｜卡哩共好</title>

<meta
    name="description"
    content="卡哩共好訂單結果"
>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:"Noto Sans TC",sans-serif;

    background:#FAF8F3;

    color:#333;

    line-height:1.8;

}

.container{

    max-width:700px;

    margin:auto;

    padding:24px;

}

.back-link{

    display:inline-flex;

    align-items:center;

    justify-content:center;

    width:48px;
    height:48px;

    border:1px solid #D8D2C8;

    border-radius:50%;

    text-decoration:none;

    color:#3E2F24;

    font-size:22px;

    margin-bottom:24px;

    background:#FFF;

}

.back-link:hover{

    background:#F4F1EA;

}

h1{

    color:#3E2F24;

    font-size:32px;

    margin-bottom:28px;

}

.result-card{

    background:#FFF;

    border-radius:16px;

    padding:32px;

    box-shadow:0 5px 20px rgba(0,0,0,.05);

}

.info-block{

    padding:18px 0;

    border-bottom:1px solid #ECE7DE;

}

.info-block:last-of-type{

    border-bottom:none;

}

.info-title{

    font-size:15px;

    color:#777;

    margin-bottom:6px;

}

.info-value{

    font-size:18px;

    font-weight:600;

    color:#3E2F24;

}

.message{

    margin-top:30px;

    padding-top:26px;

    border-top:1px solid #ECE7DE;

    text-align:center;

    color:#555;

}

.action-buttons{

    margin-top:36px;

}

.action-buttons a{

    display:block;

    width:100%;

    padding:16px;

    margin-bottom:16px;

    background:#C89B3C;

    color:#FFF;

    text-decoration:none;

    text-align:center;

    font-size:18px;

    font-weight:600;

    border-radius:12px;

    transition:.3s;

}

.action-buttons a:hover{

    opacity:.9;

}

.action-buttons a.secondary{

    background:#3E2F24;

}

@media(max-width:768px){

    .container{

        padding:20px;

    }

    .result-card{

        padding:24px;

    }

    h1{

        font-size:28px;

    }

}

</style>

</head>

<body>

<div class="container">

    <a
        href="order-form.html"
        class="back-link"
        aria-label="返回訂餐首頁"
        title="返回訂餐首頁"
    >
        ←
    </a>

    <h1 id="pageTitle">
        訂單已成立
    </h1>

    <h2 id="pageSubTitle"></h2>

    <div class="result-card">

        <div class="info-block">

            <div class="info-title">
                訂單編號
            </div>

            <div
                class="info-value"
                id="orderId"
            >
                --
            </div>

        </div>

        <div
            class="info-block"
            id="orderTypeBlock"
        >

            <div class="info-title">
                訂單類型
            </div>

            <div
                class="info-value"
                id="orderType"
            >
                --
            </div>

        </div>

        <div class="info-block">

            <div
                class="info-title"
                id="customerNameTitle"
            >
                姓名
            </div>

            <div
                class="info-value"
                id="customerName"
            >
                --
            </div>

        </div>

        <div class="info-block">

            <div class="info-title">
                電話
            </div>

            <div
                class="info-value"
                id="customerPhone"
            >
                --
            </div>

        </div>

        <div
            class="info-block"
            id="contactNameBlock"
        >

            <div class="info-title">
                聯絡人
            </div>

            <div
                class="info-value"
                id="contactName"
            >
                --
            </div>

        </div>

        <div class="info-block">

            <div class="info-title">
                付款方式
            </div>

            <div
                class="info-value"
                id="paymentMethod"
            >
                --
            </div>

        </div>

        <div class="info-block">

            <div class="info-title">
                付款狀態
            </div>

            <div
                class="info-value"
                id="paymentStatus"
            >
                --
            </div>

        </div>

        <div class="info-block">

            <div class="info-title">
                取餐日期
            </div>

            <div
                class="info-value"
                id="pickupDate"
            >
                --
            </div>

        </div>

        <div class="info-block">

            <div class="info-title">
                取餐時間
            </div>

            <div
                class="info-value"
                id="pickupTime"
            >
                --
            </div>

        </div>

        <div class="info-block">

            <div class="info-title">
                取餐據點
            </div>

            <div
                class="info-value"
                id="pickupNode"
            >
                --
            </div>

        </div>

        <div
            class="info-block"
            id="deliveryAddressBlock"
        >

            <div class="info-title">
                配送地址
            </div>

            <div
                class="info-value"
                id="deliveryAddress"
            >
                --
            </div>

        </div>

        <div class="info-block">

            <div class="info-title">
                餐點內容
            </div>

            <div
                class="info-value"
                id="orderItems"
            >
                --
            </div>

        </div>

        <div
            class="info-block"
            id="totalAmountBlock"
        >

            <div class="info-title">
                總金額
            </div>

            <div
                class="info-value"
                id="totalAmount"
            >
                --
            </div>

        </div>

        <div
            class="info-block"
            id="needCutleryBlock"
        >

            <div class="info-title">
                餐具
            </div>

            <div
                class="info-value"
                id="needCutlery"
            >
                --
            </div>

        </div>

        <div
            class="info-block"
            id="statusBlock"
        >

            <div class="info-title">
                訂單狀態
            </div>

            <div
                class="info-value"
                id="orderStatus"
            >
                --
            </div>

        </div>

        <div class="info-block">

            <div class="info-title">
                備註
            </div>

            <div
                class="info-value"
                id="remark"
            >
                --
            </div>

        </div>

        <div
            class="message"
            id="resultMessage"
        >
            謝謝您的訂購！
        </div>

        <div class="action-buttons">

            <a
                href="order-form.html"
            >
                返回訂餐首頁
            </a>

            <a
                href="order-query.html"
                class="secondary"
            >
                查詢訂單
            </a>

        </div>

    </div>

</div>

<script>

const params =
    new URLSearchParams(
        window.location.search
    );

const result =
    params.get("result");

const orderId =
    params.get("order_id");

const orderIdElement =
    document.getElementById("orderId");

const customerNameElement =
    document.getElementById("customerName");

const customerNameTitleElement =
    document.getElementById("customerNameTitle");

const orderTypeElement =
    document.getElementById("orderType");

const contactNameElement =
    document.getElementById("contactName");

const deliveryAddressElement =
    document.getElementById("deliveryAddress");

const needCutleryElement =
    document.getElementById("needCutlery");

const orderStatusElement =
    document.getElementById("orderStatus");

const totalAmountElement =
    document.getElementById("totalAmount");

const totalAmountBlock =
    document.getElementById("totalAmountBlock");

const customerPhoneElement =
    document.getElementById("customerPhone");

const pickupDateElement =
    document.getElementById("pickupDate");

const pickupTimeElement =
    document.getElementById("pickupTime");

const pickupNodeElement =
    document.getElementById("pickupNode");

const orderItemsElement =
    document.getElementById("orderItems");

const remarkElement =
    document.getElementById("remark");

const paymentMethodElement =
    document.getElementById("paymentMethod");

const paymentStatusElement =
    document.getElementById("paymentStatus");

const resultMessageElement =
    document.getElementById("resultMessage");

if(orderId){

    orderIdElement.textContent =
        orderId;

}

const API_URL =
    "https://script.google.com/macros/s/AKfycbydkuYYK9nokEHeazKTrYQhvxjl_vmN1QaVS1PwVU-uiC0sC-C3cN4u9ZxEpL_Ax7aK/exec";

if(orderId){

    fetch(
        API_URL
        + "?action=queryOrderById"
        + "&order_id="
        + encodeURIComponent(orderId)
    )

    .then(response => response.json())

    .then(data => {

        if(
            !data.success ||
            !data.order
        ){
            return;
        }

        const order =
            data.order;

        if (
            order.order_type === "group" ||
            order.order_type === "enterprise"
        ) {

            needCutleryBlock.style.display = "none";

        }

        if (order.order_type === "enterprise") {

            document.getElementById("paymentMethod")
                .parentElement.style.display = "none";

            document.getElementById("paymentStatus")
                .parentElement.style.display = "none";

            resultMessageElement.style.display = "none";

            /*
            if (
                order.order_type === "group" ||
                order.order_type === "enterprise"
            ) {

                needCutleryBlock.style.display = "none";

            }
            */

            /*
            document.getElementById("pageTitle")
                .textContent = "企業體驗";

            document.getElementById("pageSubTitle")
                .textContent = "訂單已成立";

            document.getElementById("orderTypeBlock")
                .style.display = "none";
            */

            totalAmountBlock.style.display = "none";

        }

        if (order.order_type === "enterprise") {

            orderTypeElement.textContent =
                "企業體驗";

            customerNameTitleElement.textContent =
                "公司名稱";

            customerNameElement.textContent =
                order.company_name || "--";

            contactNameElement.parentElement.style.display =
                "";

            contactNameElement.textContent =
                order.contact_name || "--";

        }
        else if (order.order_type === "group") {

            orderTypeElement.textContent =
                "團體訂餐";

            customerNameTitleElement.textContent =
                "公司名稱";

            customerNameElement.textContent =
                order.company_name || "--";

            contactNameElement.parentElement.style.display =
                "";

            contactNameElement.textContent =
                order.contact_name || "--";

        }
        else {

            orderTypeElement.textContent =
                "個人訂餐";

            customerNameTitleElement.textContent =
                "姓名";

            customerNameElement.textContent =
                order.name || "--";

            contactNameElement.parentElement.style.display =
                "none";

        }

        document.getElementById("orderTypeBlock")
            .style.display = "none";

        if (order.order_type === "enterprise") {

            document.getElementById("pageTitle")
                .textContent = "企業體驗";

            document.getElementById("pageSubTitle")
                .textContent = "訂單已成立";

        }
        else if (order.order_type === "group") {

            document.getElementById("pageTitle")
                .textContent = "團體訂餐";

            document.getElementById("pageSubTitle")
                .textContent = "訂單已成立";

        }
        else {

            document.getElementById("pageTitle")
                .textContent = "個人訂餐";

            document.getElementById("pageSubTitle")
                .textContent = "訂單已成立";

        }

        let phone =
            String(order.phone || "");

        if(
            phone &&
            phone.length === 9 &&
            phone.charAt(0) !== "0"
        ){
            phone = "0" + phone;
        }

        customerPhoneElement.textContent =
            phone || "--";

        pickupDateElement.textContent =
            formatDate(order.pickup_date);

        pickupTimeElement.textContent =
            formatTime(order.pickup_time);

        pickupNodeElement.textContent =
            order.pickup_node || "--";

        deliveryAddressElement.textContent =
            order.delivery_address || "--";

        remarkElement.textContent =
            order.remark || "--";

        needCutleryElement.textContent =
            order.need_cutlery ? "是" : "否";

        switch (order.status) {

            case "Pending":
                orderStatusElement.textContent = "待確認";
                break;

            case "Confirmed":
                orderStatusElement.textContent = "已確認";
                break;

            case "Completed":
                orderStatusElement.textContent = "已完成";
                break;

            case "Cancelled":
                orderStatusElement.textContent = "已取消";
                break;

            default:
                orderStatusElement.textContent =
                    order.status || "--";

        }

        const items = [];

        if(Number(order.pork_qty) > 0){

            items.push(
                "經典豬排咖哩 × "
                + order.pork_qty
            );

        }

        if(Number(order.chicken_qty) > 0){

            items.push(
                "無骨雞腿咖哩 × "
                + order.chicken_qty
            );

        }

        if(Number(order.daily_qty) > 0){

            items.push(
                "皮蛋肉沫咖哩 × "
                + order.daily_qty
            );

        }

        orderItemsElement.innerHTML =
            items.length
                ? items.join("<br>")
                : "--";

        const totalAmount =
            Number(order.total_amount || 0);

        totalAmountElement.textContent =
            "NT$" + totalAmount;

        const totalQty =
            Number(order.pork_qty || 0) +
            Number(order.chicken_qty || 0) +
            Number(order.daily_qty || 0);

        const deliveryAddressBlock =
            document.getElementById("deliveryAddressBlock");

        if (order.order_type === "enterprise") {

            deliveryAddressBlock.style.display =
                "block";

        }
        else {

            if (totalQty >= 5) {

                deliveryAddressBlock.style.display =
                    "block";

            }
            else {

                deliveryAddressBlock.style.display =
                    "none";

            }

        }

    })

    .catch(error=>{

        console.error(error);

    });

}

if(result==="success"){

    paymentMethodElement.textContent =
        "LINE Pay";

    paymentStatusElement.textContent =
        "已付款";

    resultMessageElement.textContent =
        "付款完成，謝謝您的訂購！";

}
else if(result==="failed"){

    paymentMethodElement.textContent =
        "LINE Pay";

    paymentStatusElement.textContent =
        "付款失敗";

    resultMessageElement.textContent =
        "付款未完成，請稍後再試。";

}
else{

    paymentMethodElement.textContent =
        "現金";

    paymentStatusElement.textContent =
        "等待付款";

    resultMessageElement.textContent =
        "訂單已成立，請於取餐時完成付款。";

}

function formatDate(value){

    if(!value){
        return "--";
    }

    const date = new Date(value);

    if(isNaN(date)){
        return value;
    }

    const yyyy = date.getFullYear();

    const mm = String(date.getMonth()+1)
        .padStart(2,"0");

    const dd = String(date.getDate())
        .padStart(2,"0");

    return `${yyyy}-${mm}-${dd}`;

}

function formatTime(value){

    if(!value){
        return "--";
    }

    const date = new Date(value);

    if(isNaN(date)){
        return value;
    }

    const hh = String(date.getHours())
        .padStart(2,"0");

    const mm = String(date.getMinutes())
        .padStart(2,"0");

    return `${hh}:${mm}`;

}

</script>

</body>

</html>
