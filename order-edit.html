<!DOCTYPE html>
<html lang="zh-Hant">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
>

<title>修改訂單｜卡哩共好</title>

<meta
    name="description"
    content="修改訂單"
>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Noto Sans TC",sans-serif;
    background:#FAF8F3;
    color:#333;
    line-height:1.8;
}

.container{
    max-width:800px;
    margin:auto;
    padding:24px;
}

.back-link{

    display:inline-flex;
    align-items:center;
    justify-content:center;

    width:48px;
    height:48px;

    border:1px solid #D8D2C8;
    border-radius:50%;

    text-decoration:none;

    color:#3E2F24;

    font-size:22px;

    margin-bottom:24px;

    background:#FFF;

}

.back-link:hover{
    background:#F4F1EA;
}

h1{
    color:#3E2F24;
    margin-bottom:24px;
    font-size:32px;
}

.form-wrapper{

    background:#FFF;

    padding:32px;

    border-radius:16px;

    box-shadow:0 5px 20px rgba(0,0,0,0.05);

}

.form-group{
    margin-bottom:22px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#3E2F24;
}

input,
select,
textarea{

    width:100%;

    padding:12px 14px;

    border:1px solid #D8D2C8;

    border-radius:10px;

    font-size:16px;

    background:#FFF;

}

textarea{
    min-height:120px;
    resize:vertical;
}

.section-title{

    margin-top:32px;
    margin-bottom:16px;

    font-size:20px;
    font-weight:700;

    color:#3E2F24;

}

.submit-btn{

    width:100%;

    margin-top:20px;

    padding:16px;

    border:none;

    border-radius:12px;

    background:#C89B3C;

    color:#FFF;

    font-size:18px;

    font-weight:700;

    cursor:pointer;

}

.submit-btn:hover{
    opacity:0.9;
}

.hidden{
    display:none;
}
</style>

</head>

<body>

<div class="container">

    <a
        href="order-query.html"
        class="back-link"
    >
        ←
    </a>

    <h1>修改訂單</h1>

    <div class="form-wrapper">

        <form id="editForm">

            <input
                type="hidden"
                id="order_id"
            >

            <div id="formContent">

            </div>

            <button
                type="submit"
                class="submit-btn"
            >
                儲存修改
            </button>

        </form>

    </div>

</div>

<script>

const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbydkuYYK9nokEHeazKTrYQhvxjl_vmN1QaVS1PwVU-uiC0sC-C3cN4u9ZxEpL_Ax7aK/exec";

const urlParams =
new URLSearchParams(
    window.location.search
);

const orderId =
    urlParams.get("order_id");

console.log(
  window.location.href
);

console.log(
  "orderId=",
  orderId
);

let currentOrder = null;

async function loadOrder() {

    if (!orderId) {

        alert("缺少訂單編號");

        return;

    }

    try {

        const response =
        await fetch(

            WEB_APP_URL +
            "?action=queryOrderById&order_id=" +
            encodeURIComponent(orderId)

        );

        const result =
        await response.json();

        if (!result.order) {

            alert("查無訂單");

            return;

        }

        currentOrder =
        result.order;

        document
        .getElementById("order_id")
        .value =
        currentOrder.order_id;

        document
        .getElementById("formContent")
        .innerHTML = `

            <div class="section-title">
                基本資料
            </div>

            <div class="form-group">
                <label>姓名</label>
                <input
                    id="name"
                    value="${currentOrder.name || ""}"
                >
            </div>

            <div class="form-group">
                <label>手機</label>
                <input
                    id="phone"
                    value="0${currentOrder.phone || ""}"
                >
            </div>

            <div class="form-group">
                <label>LINE 名稱</label>
                <input
                    id="line_name"
                    value="${currentOrder.line_name || ""}"
                >
            </div>

            <div class="form-group">
                <label>公司名稱</label>
                <input
                    id="company_name"
                    value="${currentOrder.company_name || ""}"
                >
            </div>

            <div class="form-group">
                <label>聯絡人</label>
                <input
                    id="contact_name"
                    value="${currentOrder.contact_name || ""}"
                >
            </div>

            <div class="form-group">
                <label>備註</label>
                <textarea
                    id="remark"
                >${currentOrder.remark || ""}</textarea>
            </div>

        `;

    }
    catch(error) {

        console.error(error);

        alert("載入失敗");

    }

}

async function saveOrder(e) {

    e.preventDefault();

    try {

        const params =
        new URLSearchParams();

        params.append(
            "action",
            "updateOrder"
        );

        params.append(
            "order_id",
            document
            .getElementById("order_id")
            .value
        );

        params.append(
            "name",
            document
            .getElementById("name")
            ?.value || ""
        );

        params.append(
            "phone",
            document
            .getElementById("phone")
            ?.value.replace(/^0/,"") || ""
        );

        params.append(
            "line_name",
            document
            .getElementById("line_name")
            ?.value || ""
        );

        params.append(
            "company_name",
            document
            .getElementById("company_name")
            ?.value || ""
        );

        params.append(
            "contact_name",
            document
            .getElementById("contact_name")
            ?.value || ""
        );

        params.append(
            "remark",
            document
            .getElementById("remark")
            ?.value || ""
        );

        const response =
        await fetch(

            WEB_APP_URL +
            "?" +
            params.toString()

        );

        const result =
        await response.json();

        if (result.success) {

            alert(
                "訂單修改成功"
            );

            window.location.href =
            "order-query.html";

        }
        else {

            alert(
                "修改失敗"
            );

        }

    }
    catch(error) {

        console.error(error);

        alert(
            "系統發生錯誤"
        );

    }

}

document
.getElementById("editForm")
.addEventListener(
    "submit",
    saveOrder
);

loadOrder();

</script>

</body>

</html>
