<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>訂單查詢｜卡哩共好</title>

<meta name="description" content="查詢、修改或取消訂單">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Noto Sans TC",sans-serif;
    background:#FAF8F3;
    color:#333;
    line-height:1.8;
}

.container{
    max-width:800px;
    margin:auto;
    padding:24px;
}

.back-link{

    display:inline-flex;
    align-items:center;
    justify-content:center;

    width:48px;
    height:48px;

    border:1px solid #D8D2C8;
    border-radius:50%;

    text-decoration:none;

    color:#3E2F24;

    font-size:22px;

    margin-bottom:24px;

    background:#FFF;

}

.back-link:hover{
    background:#F4F1EA;
}

h1{
    color:#3E2F24;
    margin-bottom:20px;
    font-size:32px;
}

.notice{

    margin-bottom:24px;

    padding:16px 20px;

    background:#F4F1EA;

    border-radius:12px;

    font-size:15px;

    font-weight:600;

    color:#3E2F24;

}

.intro{

    background:#FFF;

    padding:24px;

    border-radius:16px;

    margin-bottom:32px;

    color:#555;

    box-shadow:0 5px 20px rgba(0,0,0,0.05);

}

.form-wrapper{

    background:#FFF;

    padding:32px;

    border-radius:16px;

    box-shadow:0 5px 20px rgba(0,0,0,0.05);

}

.form-group{
    margin-bottom:22px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#3E2F24;
}

input{

    width:100%;

    padding:12px 14px;

    border:1px solid #D8D2C8;

    border-radius:10px;

    font-size:16px;

    background:#FFF;

}

.submit-btn{

    width:100%;

    margin-top:10px;

    padding:16px;

    border:none;

    border-radius:12px;

    background:#C89B3C;

    color:#FFF;

    font-size:18px;

    font-weight:700;

    cursor:pointer;

}

.submit-btn:hover{
    opacity:0.9;
}

.result-card{

    display:none;

    margin-top:32px;

    background:#FFF;

    border-radius:16px;

    padding:24px;

    box-shadow:0 5px 20px rgba(0,0,0,0.05);

}

.result-item{

    margin-bottom:12px;

}

.result-label{

    font-weight:700;

    color:#3E2F24;

}

.action-buttons{

    display:flex;

    gap:16px;

    margin-top:24px;

}

.action-btn{

    flex:1;

    padding:14px;

    border:none;

    border-radius:12px;

    font-size:16px;

    font-weight:700;

    cursor:pointer;

}

.edit-btn{

    background:#C89B3C;

    color:#FFF;

}

.cancel-btn{

    background:#C0392B;

    color:#FFF;

}

.loading{

    display:none;

    text-align:center;

    margin-top:20px;

}

@media(max-width:768px){

    .container{
        padding:20px;
    }

    .form-wrapper{
        padding:24px;
    }

    h1{
        font-size:28px;
    }

    .action-buttons{
        flex-direction:column;
    }

}

.loading-overlay{

    display:none;

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.65);

    z-index:9999;

    justify-content:center;
    align-items:center;

}

.loading-box{

    background:#FFF;

    padding:30px;

    border-radius:16px;

    text-align:center;

    min-width:220px;

}

.spinner{

    width:48px;
    height:48px;

    border:4px solid #DDD;

    border-top:4px solid #C89B3C;

    border-radius:50%;

    animation:spin 1s linear infinite;

    margin:0 auto 16px;

}

@keyframes spin{

    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }

}

</style>

</head>

<body>

<div class="container">

    <a
        href="order-form.html"
        class="back-link"
        aria-label="返回上一頁"
        title="返回上一頁"
    >
        ←
    </a>

    <h1>訂單查詢</h1>

    <div class="notice">

        請輸入訂餐時使用的手機號碼查詢目前訂單。

    </div>

    <div class="intro">

        查詢成功後，可進行訂單修改或取消。

    </div>

    <div class="form-wrapper">

        <div class="form-group">

            <label>手機號碼</label>

            <input
                type="tel"
                id="phone"
                placeholder="請輸入手機號碼"
            >

        </div>

        <button
            id="queryBtn"
            class="submit-btn"
        >
            查詢訂單
        </button>

        <div
            id="loading"
            class="loading"
        >
            查詢中...
        </div>

    </div>

    <div
        id="resultCard"
        class="result-card"
    >

        <div class="result-item">
            <span class="result-label">訂單編號：</span>
            <span id="orderId"></span>
        </div>

        <div class="result-item">
            <span class="result-label">訂單類型：</span>
            <span id="orderType"></span>
        </div>

        <div class="result-item" id="nameRow">
            <span class="result-label">姓名：</span>
            <span id="name"></span>
        </div>

        <div class="result-item" id="companyRow" style="display:none;">
            <span class="result-label">公司名稱：</span>
            <span id="companyName"></span>
        </div>

        <div class="result-item" id="contactRow" style="display:none;">
            <span class="result-label">聯絡人：</span>
            <span id="contactName"></span>
        </div>

        <div class="result-item">
            <span class="result-label">手機：</span>
            <span id="phoneValue"></span>
        </div>

        <div class="result-item">
            <span class="result-label">取餐日期：</span>
            <span id="pickupDate"></span>
        </div>

        <div class="result-item">
            <span class="result-label">取餐時間：</span>
            <span id="pickupTime"></span>
        </div>

        <div class="result-item">
            <span class="result-label">取餐據點：</span>
            <span id="pickupNode"></span>
        </div>

        <div class="result-item">
            <span class="result-label">餐點內容：</span>
            <div id="mealContent"></div>
        </div>

        <div class="result-item">
            <span class="result-label">訂單狀態：</span>
            <span id="status"></span>
        </div>

        <div
            class="result-item"
            id="cutleryRow"
            style="display:none;"
        >
            <span class="result-label">餐具需求：</span>
            <span>需要餐具</span>
        </div>

        <div class="result-item">
            <span class="result-label">備註：</span>
            <span id="remark"></span>
        </div>

        <div class="result-item">
            <span class="result-label">付款方式：</span>
            <span id="paymentMethod"></span>
        </div>

        <div class="result-item">
            <span class="result-label">付款狀態：</span>
            <span id="paymentStatus"></span>
        </div>

        <div class="action-buttons">

            <button
                class="action-btn edit-btn"
                id="editBtn"
            >
                修改訂單
            </button>

            <button
                class="action-btn cancel-btn"
                id="cancelBtn"
            >
                取消訂單
            </button>

        </div>

    </div>

</div>

<script>

const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbydkuYYK9nokEHeazKTrYQhvxjl_vmN1QaVS1PwVU-uiC0sC-C3cN4u9ZxEpL_Ax7aK/exec";

function disableAllComponents() {

    document
    .querySelectorAll(
        "button,input,select,textarea"
    )
    .forEach(el => {

        el.disabled = true;

    });

}

function enableAllComponents() {

    document
    .querySelectorAll(
        "button,input,select,textarea"
    )
    .forEach(el => {

        el.disabled = false;

    });

}

function showLoading() {

    disableAllComponents();

    document
    .getElementById("loadingOverlay")
    .style.display = "flex";

}

function hideLoading() {

    document
    .getElementById("loadingOverlay")
    .style.display = "none";

    enableAllComponents();

}

document
.getElementById("queryBtn")
.addEventListener("click", async () => {

    document
    .getElementById("resultCard")
    .style.display = "none";

    document
    .getElementById("orderId")
    .textContent = "";

    document.getElementById("orderType").textContent="";
    document.getElementById("companyName").textContent="";
    document.getElementById("contactName").textContent="";
    document.getElementById("mealContent").innerHTML="";
    document.getElementById("remark").textContent="";
    document.getElementById("paymentMethod").textContent="";
    document.getElementById("paymentStatus").textContent="";

    document.getElementById("companyRow").style.display="none";
    document.getElementById("contactRow").style.display="none";
    document.getElementById("nameRow").style.display="";
    document.getElementById("cutleryRow").style.display="none";

    document
    .getElementById("name")
    .textContent = "";

    document
    .getElementById("phoneValue")
    .textContent = "";

    document
    .getElementById("pickupDate")
    .textContent = "";

    document
    .getElementById("pickupTime")
    .textContent = "";

    document
    .getElementById("pickupNode")
    .textContent = "";

    document
    .getElementById("porkQty")
    .textContent = "";

    document
    .getElementById("chickenQty")
    .textContent = "";

    document
    .getElementById("dailyQty")
    .textContent = "";

    document
    .getElementById("status")
    .textContent = "";

    const phone =
    document
    .getElementById("phone")
    .value
    .trim();

    const searchPhone =
    phone.startsWith("0")
    ? phone.substring(1)
    : phone;

    if(!phone){

        alert("請輸入手機號碼");

        return;

    }

    document
    .getElementById("loading")
    .style.display = "block";
    showLoading();

    try{

        const response =
        await fetch(

            WEB_APP_URL +
            "?action=queryOrder&phone=" +
            encodeURIComponent(searchPhone)

        );

        const result =
        await response.json();

        document
        .getElementById("loading")
        .style.display = "none";
        hideLoading();

        if(
            !result.order
        ){

            alert("查無進行中訂單");

            return;

        }

        window.currentOrder =
          result.order;

        const order =
          result.order;

        document
        .getElementById("orderId")
        .textContent =
        order.order_id || "";

        const typeMap={
            personal:"個人訂餐",
            group:"團體訂餐",
            enterprise:"企業體驗"
        };

        document.getElementById("orderType").textContent=
        typeMap[order.order_type] || order.order_type;

        if(order.order_type==="personal"){

            document.getElementById("name").textContent=
                order.name || "";

        }
        else{

            document.getElementById("nameRow").style.display="none";

            document.getElementById("companyRow").style.display="";

            document.getElementById("contactRow").style.display="";

            document.getElementById("companyName").textContent=
                order.company_name || "";

            document.getElementById("contactName").textContent=
                order.contact_name || "";

        }

        document
        .getElementById("phoneValue")
        .textContent =
        "0" + (order.phone || "");

        const pickupDate =
        new Date(order.pickup_date);

        document
        .getElementById("pickupDate")
        .textContent =
        pickupDate.toLocaleDateString(
            "zh-TW",
            {
                timeZone:"Asia/Taipei"
            }
        );

        const pickupTime =
        new Date(order.pickup_time);

        document
        .getElementById("pickupTime")
        .textContent =
        pickupTime.toLocaleTimeString(
            "zh-TW",
            {
                timeZone:"Asia/Taipei",
                hour:"2-digit",
                minute:"2-digit",
                hour12:false
            }
        );

        document
        .getElementById("pickupNode")
        .textContent =
        order.pickup_node || "";

        let meals=[];

        if(Number(order.pork_qty)>0){

            meals.push(
                "經典豬排咖哩 × " + order.pork_qty
            );

        }

        if(Number(order.chicken_qty)>0){

            meals.push(
                "無骨雞腿咖哩 × " + order.chicken_qty
            );

        }

        if(Number(order.daily_qty)>0){

            meals.push(
                "皮蛋肉沫咖哩 × " + order.daily_qty
            );

        }

        document
        .getElementById("mealContent")
        .innerHTML=
        meals.join("<br>");

        document
        .getElementById("status")
        .textContent =
        order.status || "";

        if(order.need_cutlery){

            document
            .getElementById("cutleryRow")
            .style.display="";

        }

        document
        .getElementById("remark")
        .textContent=
        order.remark || "暫無特殊需求。";

        document
        .getElementById("paymentMethod")
        .textContent=
        order.payment_method || "";

        document
        .getElementById("paymentStatus")
        .textContent=
        order.payment_status || "";

        document
        .getElementById("resultCard")
        .style.display = "block";

    }
    catch(error){

        hideLoading();

        document
        .getElementById("loading")
        .style.display = "none";

        alert("系統發生錯誤");

        console.error(error);

    }

});

document
.getElementById("editBtn")
.addEventListener("click", () => {

    const phone =
      currentOrder.phone;

    window.location.href =
      "order-edit.html?order_id=" +
      encodeURIComponent(
        currentOrder.order_id
      );

});

document
.getElementById("cancelBtn")
.addEventListener("click", async () => {

    const confirmCancel =
    confirm("確定要取消此訂單嗎？");

    if (!confirmCancel) {

        return;

    }

    try {

        showLoading();

        const orderId =
        document
        .getElementById("orderId")
        .textContent
        .trim();

        const response =
        await fetch(

            WEB_APP_URL +
            "?action=cancelOrder&order_id=" +
            encodeURIComponent(orderId)

        );

        const result =
        await response.json();

        if (result.success) {

            hideLoading();

            alert("訂單已取消");

            document
            .getElementById("resultCard")
            .style.display = "none";

        } else {

            hideLoading();

            alert("取消失敗");

        }

    } catch (error) {

        hideLoading();

        console.error(error);

        alert("系統發生錯誤");

    }

});

</script>

<div id="loadingOverlay" class="loading-overlay">

    <div class="loading-box">

        <div class="spinner"></div>

        <p>
            處理中...
            <br>
            請稍候
        </p>

    </div>

</div>

</body>
</html>
