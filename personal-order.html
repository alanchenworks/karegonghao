<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>個人訂餐｜卡哩共好</title>

<meta name="description" content="卡哩共好個人訂餐">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Noto Sans TC",sans-serif;
    background:#FAF8F3;
    color:#333;
    line-height:1.8;
}

.container{
    max-width:800px;
    margin:auto;
    padding:24px;
}

.back-link{

    display:inline-flex;
    align-items:center;
    justify-content:center;

    width:48px;
    height:48px;

    border:1px solid #D8D2C8;
    border-radius:50%;

    text-decoration:none;

    color:#3E2F24;

    font-size:22px;

    margin-bottom:24px;

    background:#FFF;

}

.back-link:hover{
    background:#F4F1EA;
}

h1{
    color:#3E2F24;
    margin-bottom:20px;
    font-size:32px;
}

.intro{

    background:#FFF;

    padding:24px;

    border-radius:16px;

    margin-bottom:32px;

    color:#555;

    box-shadow:0 5px 20px rgba(0,0,0,0.05);

}

.notice{

    margin-bottom:24px;

    padding:16px 20px;

    background:#F4F1EA;

    border-radius:12px;

    font-size:15px;

    font-weight:600;

    color:#3E2F24;

}

.form-wrapper{

    background:#FFF;

    padding:32px;

    border-radius:16px;

    box-shadow:0 5px 20px rgba(0,0,0,0.05);

}

.form-group{
    margin-bottom:22px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#3E2F24;
}

input,
select,
textarea{

    width:100%;

    padding:12px 14px;

    border:1px solid #D8D2C8;

    border-radius:10px;

    font-size:16px;

    background:#FFF;

}

textarea{
    min-height:120px;
    resize:vertical;
}

.checkbox-group{

    display:flex;
    flex-wrap:wrap;
    gap:18px;

}

.checkbox-item{

    display:flex;
    align-items:center;
    gap:8px;

}

.checkbox-item input{
    width:auto;
}

.section-title{

    margin-top:40px;
    margin-bottom:20px;

    font-size:20px;
    font-weight:700;

    color:#3E2F24;

}

.menu-card{

    border:1px solid #E5E0D6;

    border-radius:12px;

    padding:18px;

    margin-bottom:16px;

}

.menu-card h3{

    font-size:18px;

    margin-bottom:12px;

    color:#3E2F24;

}

.qty-input{
    max-width:150px;
}

.submit-btn{

    width:100%;

    margin-top:20px;

    padding:16px;

    border:none;

    border-radius:12px;

    background:#C89B3C;

    color:#FFF;

    font-size:18px;

    font-weight:700;

    cursor:pointer;

}

.submit-btn:hover{
    opacity:0.9;
}

.required{
    color:#C0392B;
}

@media(max-width:768px){

    .container{
        padding:20px;
    }

    .form-wrapper{
        padding:24px;
    }

    h1{
        font-size:28px;
    }

}

.loading-overlay{

    display:none;

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.65);

    z-index:9999;

    justify-content:center;
    align-items:center;

}

.loading-box{

    background:#FFF;

    padding:30px;

    border-radius:16px;

    text-align:center;

    min-width:220px;

}

.spinner{

    width:48px;
    height:48px;

    border:4px solid #DDD;

    border-top:4px solid #C89B3C;

    border-radius:50%;

    animation:spin 1s linear infinite;

    margin:0 auto 16px;

}

@keyframes spin{

    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }

}


</style>
</head>

<body>

<div class="container">

    <a
        href="order-form.html"
        class="back-link"
        aria-label="返回上一頁"
        title="返回上一頁"
    >
        ←
    </a>

    <h1>個人訂餐</h1>

    <div class="notice">

        <strong>卡哩訂餐須知</strong>

        <br><br>

        採預約制，不受理當日訂單
        <br>

        營業時間：週一至週五
        <br>

        送餐時段：11:30－13:00（正負15分鐘）
        <br>

        10份以下請至指定地點取餐
        <br>

        10份（含）以上享免費配送服務
        <br>

        團體訂餐及企業合作歡迎提前洽詢

    </div>

    <div class="intro">

        <strong>
            讓每個人都有機會創造價值，讓每份價值都能找到連結。
        </strong>

        <br><br>

        卡哩共好｜共享一份餐，連結更多可能

    </div>

    <div class="form-wrapper">

        <form id="personalOrderForm">

            <div class="section-title">
                基本資料
            </div>

            <div class="form-group">
                <label>姓名 <span class="required">*</span></label>
                <input type="text" name="name" required>
            </div>

            <div class="form-group">
                <label>手機 <span class="required">*</span></label>
                <input type="tel" name="phone" required>
            </div>

            <div class="form-group">
                <label>LINE 名稱</label>
                <input type="text" name="line_name">
            </div>

            <div class="form-group">
                <label>來源 Source</label>
                <select name="source">
                    <option value="">請選擇</option>
                    <option>海報</option>
                    <option>FB</option>
                    <option>IG</option>
                    <option>朋友介紹</option>
                    <option>社區活動</option>
                    <option>其他</option>
                </select>
            </div>

            <div class="form-group">
                <label>是否首次購買</label>
                <select name="first_purchase">
                    <option value="">請選擇</option>
                    <option>是</option>
                    <option>否</option>
                </select>
            </div>

            <div class="section-title">
                取餐資訊
            </div>

            <div class="form-group">
                <label>取餐日期 <span class="required">*</span></label>
                <input type="date" name="pickup_date" required>
            </div>

            <div class="form-group">
                <label>取餐時段 <span class="required">*</span></label>
                <select name="pickup_time" required>
                    <option value="">請選擇</option>
                    <option>11:30</option>
                    <option>11:45</option>
                    <option>12:00</option>
                    <option>12:15</option>
                    <option>12:30</option>
                    <option>12:45</option>
                    <option>13:00</option>
                </select>
            </div>

            <div class="form-group">
                <label>取餐據點 <span class="required">*</span></label>
                <select name="pickup_node" required>
                    <option value="">請選擇</option>
                    <option>亞東醫院</option>
                    <option>板橋站</option>
                    <option>其他指定據點</option>
                </select>
            </div>

            <div class="form-group">
                <label>配送／取餐地址</label>
                <textarea
                    name="delivery_address"
                    placeholder="請填寫完整地址或指定取餐地點"
                ></textarea>
            </div>

            <div class="section-title">
                餐點選擇
            </div>

            <div class="menu-card">

                <h3>🍛 經典豬排咖哩</h3>

                <label>數量</label>

                <input
                    type="number"
                    min="0"
                    value="0"
                    class="qty-input"
                    name="pork_curry_qty"
                >

            </div>

            <div class="menu-card">

                <h3>🍛 無骨雞腿咖哩</h3>

                <label>數量</label>

                <input
                    type="number"
                    min="0"
                    value="0"
                    class="qty-input"
                    name="chicken_curry_qty"
                >

            </div>

            <div class="menu-card">

                <h3>🍛 皮蛋肉沫咖哩</h3>

                <label>數量</label>

                <input
                    type="number"
                    min="0"
                    value="0"
                    class="qty-input"
                    name="daily_special_qty"
                >

            </div>

            <div class="section-title">
                附加選項
            </div>

            <div class="checkbox-group">

              <div style="display:none;">

                <label class="checkbox-item">
                    <input type="checkbox" name="extra_rice">
                    加飯
                </label>

                <label class="checkbox-item">
                    <input type="checkbox" name="no_spicy">
                    不辣
                </label>

              </div>

                <label class="checkbox-item">
                    <input type="checkbox" name="need_cutlery">
                    需要餐具
                </label>

            </div>

            <div class="section-title">
                付款方式
            </div>

            <div class="form-group">

                <select name="payment_method">

                    <option value="">請選擇</option>

                    <option>現金</option>

                    <option>LINE Pay</option>

                </select>

            </div>

            <div class="section-title">
                備註
            </div>

            <div class="form-group">

                <textarea
                    name="remark"
                    placeholder="如有特殊需求，請於此說明..."
                ></textarea>

            </div>

            <button
                type="submit"
                class="submit-btn"
            >
                確定送出
            </button>

        </form>

    </div>

</div>

<script>

/* const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbyrn7t13kIR-pItz22f_zZjg-_Uk8n2ziAjJuAzb2UzM1_lNMxLSd3leqTmoi9VPVSo/exec"; */

const WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbydkuYYK9nokEHeazKTrYQhvxjl_vmN1QaVS1PwVU-uiC0sC-C3cN4u9ZxEpL_Ax7aK/exec";

document
.getElementById("personalOrderForm")
.addEventListener("submit", async function(e){

    e.preventDefault();

    const form = e.target;

    const selectedDate =
    new Date(
        form.pickup_date.value
    );

    selectedDate.setHours(
        0,0,0,0
    );

    const minDate =
    new Date();

    minDate.setHours(
        0,0,0,0
    );

    minDate.setDate(
        minDate.getDate() + 1
    );

    if (
        selectedDate < minDate
    ) {

        alert(
            "不受理當日及過往日期訂單"
        );

        return;
    }

    const data = {

        order_type : "personal",

        name : form.name.value,
        phone : form.phone.value,
        line_name : form.line_name.value,

        source : form.source.value,
        first_purchase : form.first_purchase.value,

        company_name : "",
        contact_name : "",

        pickup_date : form.pickup_date.value,
        pickup_time : form.pickup_time.value,
        pickup_node : form.pickup_node.value,

        delivery_address : form.delivery_address.value,

        pork_qty : form.pork_curry_qty.value,
        chicken_qty : form.chicken_curry_qty.value,
        daily_qty : form.daily_special_qty.value,

        extra_rice : form.extra_rice.checked,
        no_spicy : form.no_spicy.checked,
        need_cutlery : form.need_cutlery.checked,

        payment_method : form.payment_method.value,

        remark : form.remark.value

    };

    try {

        document
        .getElementById("loadingOverlay")
        .style.display = "flex";

        const response = await fetch(
            WEB_APP_URL,
            {
                method : "POST",
                body : JSON.stringify(data)
            }
        );

        const result = await response.json();

        if(!result.success){

            alert(result.message);

            document
            .getElementById("loadingOverlay")
            .style.display = "none";

            return;

        }

        if(result.success){

            if(result.payment_url){

                window.location =
                    result.payment_url;

                return;

            }

            alert(
                "訂單送出成功\n\n訂單編號：" +
                result.order_id
            );

            form.reset();

            document
            .getElementById("loadingOverlay")
            .style.display = "none";

        } else {

            document
            .getElementById("loadingOverlay")
            .style.display = "none";

            alert("送出失敗");

        }

    } catch(error){

        document
        .getElementById("loadingOverlay")
        .style.display = "none";

        console.error(error);

        alert("系統發生錯誤");

    }

});

</script>

<div id="loadingOverlay" class="loading-overlay">

    <div class="loading-box">

        <div class="spinner"></div>

        <p>
            訂單送出中...
            <br>
            請稍候
        </p>

    </div>

</div>

</body>
</html>
